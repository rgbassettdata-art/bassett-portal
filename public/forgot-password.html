<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password — RG Bassett &amp; Sons</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="stylesheet" href="/css/login.css" />
</head>
<body>
    <div class="login-container">
        <div class="login-brand">
            <img src="/logo.png" alt="RG Bassett & Sons" class="login-logo" />
            <span class="login-brand-eyebrow">RG Bassett &amp; Sons Ltd</span>
            <h1>Reset Password</h1>
        </div>

        <div id="sent-message" style="display:none">
            <p id="message">If that email address is registered, a reset link has been sent. Please check your inbox.</p>
            <a href="/login.html" class="login-back">Back to Sign In</a>
        </div>

        <form id="forgot-form" method="POST" action="/forgot-password">
            <label for="email">Email Address</label>
            <input id="email" name="email" type="email" autocomplete="email" required placeholder="your.email@example.com" />

            <button type="submit">Send Reset Link</button>
        </form>

        <a href="/login.html" class="login-back">Back to Sign In</a>

        <p id="error"></p>
    </div>
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            if (params.get('sent') === '1') {
                document.getElementById('sent-message').style.display = 'block';
                document.getElementById('forgot-form').style.display = 'none';
                document.querySelector('.login-back').style.display = 'none';
            }
            const err = params.get('error');
            if (err) {
                const el = document.getElementById('error');
                if (el) el.textContent = decodeURIComponent(err);
            }
        })();
    </script>
</body>
</html>
