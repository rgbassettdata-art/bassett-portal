<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set New Password — RG Bassett &amp; Sons</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="stylesheet" href="/css/login.css" />
</head>
<body>
    <div class="login-container">
        <div class="login-brand">
            <img src="/logo.png" alt="RG Bassett & Sons" class="login-logo" />
            <span class="login-brand-eyebrow">RG Bassett &amp; Sons Ltd</span>
            <h1>Set New Password</h1>
        </div>

        <form id="reset-form" method="POST" action="/reset-password">
            <input type="hidden" id="token-input" name="token" value="" />

            <label for="password">New Password</label>
            <input id="password" name="password" type="password" autocomplete="new-password" required minlength="6" />

            <label for="confirmPassword">Confirm Password</label>
            <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" required minlength="6" />

            <button type="submit">Save New Password</button>
        </form>

        <div id="invalid-token" style="display:none">
            <p id="error"></p>
            <a href="/forgot-password.html" class="login-back">Request a new reset link</a>
        </div>

        <p id="error-inline" style="display:none"></p>
        <a href="/login.html" class="login-back">Back to Sign In</a>
    </div>
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const err = params.get('error');

            if (!token) {
                // No token — show the invalid message
                document.getElementById('reset-form').style.display = 'none';
                document.getElementById('invalid-token').style.display = 'block';
                document.getElementById('error').textContent = 'No reset token found. Please request a new password reset link.';
                return;
            }

            document.getElementById('token-input').value = token;

            if (err) {
                const el = document.getElementById('error-inline');
                el.textContent = decodeURIComponent(err);
                el.style.display = 'block';
                el.style.color = '#b92b2b';
                el.style.fontSize = '0.85rem';
                el.style.textAlign = 'center';
                el.style.marginTop = '1rem';
            }

            // Client-side confirm match check before submit
            document.getElementById('reset-form').addEventListener('submit', function (e) {
                const pw = document.getElementById('password').value;
                const cpw = document.getElementById('confirmPassword').value;
                if (pw !== cpw) {
                    e.preventDefault();
                    const el = document.getElementById('error-inline');
                    el.textContent = 'Passwords do not match.';
                    el.style.display = 'block';
                    el.style.color = '#b92b2b';
                    el.style.fontSize = '0.85rem';
                    el.style.textAlign = 'center';
                    el.style.marginTop = '1rem';
                }
            });
        })();
    </script>
</body>
</html>
